id: facebook
label: Facebook (Graph API / export)
prebuilt: true
transport: rest
auth: bearer
base_url_from: fixed
base_url: https://graph.facebook.com

capabilities:
  - post
  - comment

scopes:
  - page:{page_id}
  - profile:{user_id}
  - group:{group_id}

collect_types:
  post:
    source: sns_post
    type: post
  comment:
    source: sns_comment
    type: comment

endpoints:
  page_feed:
    method: GET
    path: /{{ query.page_id }}/feed
    params:
      fields: "id,message,created_time,permalink_url,from"
      limit: "{{ query.limit | default(50) }}"
      access_token: "{{ auth.token }}"
  user_posts:
    method: GET
    path: /{{ query.user_id }}/posts
    params:
      fields: "id,message,created_time,permalink_url"
      limit: "{{ query.limit | default(50) }}"
      access_token: "{{ auth.token }}"

mapping:
  post:
    list_path: data
    content: "{{ message }}"
    author: "{{ from.name | default(from.id) }}"
    timestamp: "{{ created_time }}"
    url: "{{ permalink_url }}"
    thread_id: "{{ id }}"

# Official Graph only (Pages you manage / data you are allowed to read).
# Member export mode: set transport override via auth profile file pack.
connection:
  preferred_mode: graph_page
  modes:
    - id: graph_page
      label: Meta Graph API (Page you manage)
      auth_type: bearer
      env:
        token: FACEBOOK_ACCESS_TOKEN
        app_id: FACEBOOK_APP_ID
      steps:
        - Create a Meta developer app at https://developers.facebook.com/
        - Add Facebook Login / Pages product as needed
        - Generate a Page access token with pages_read_engagement (and only scopes you need)
        - Never put the token in targets.json — use env + auth_ref
        - "kampff-collect connect setup --platform facebook --ref facebook_graph --mode graph_page"
    - id: data_export
      label: Facebook data download (your account)
      auth_type: file_export
      transport: file
      env:
        export_dir: FACEBOOK_EXPORT_DIR
      steps:
        - Meta Accounts Center → Download your information
        - Unzip under a path outside git
        - "set FACEBOOK_EXPORT_DIR=/path/to/export"
        - "kampff-collect connect setup --platform facebook --ref facebook_export --mode data_export"
  targets_snippet:
    platform: facebook
    url: "https://www.facebook.com/{page_or_profile}/"
    scope: "page:{page_id}"
    collect: ["post", "comment"]
    auth_ref: facebook_graph
    query:
      page_id: ""
      author_display: ""
      limit: 50
  lawful_note: >-
    Use only tokens/exports for surfaces you own or are authorized to process.
    Do not scrape logged-in Facebook outside official APIs/exports.
